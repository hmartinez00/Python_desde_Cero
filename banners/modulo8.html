<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
  .module-banner {
    background: linear-gradient(135deg, #0f0c29 0%, #1a1447 50%, #0a1f3a 100%);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
    max-width: 1000px;
    margin: 30px auto;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0ff;
    position: relative;
  }

  .circuit-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 15% 25%, rgba(0, 255, 255, 0.07) 0%, transparent 60%),
                radial-gradient(circle at 85% 75%, rgba(138, 43, 226, 0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .content-wrapper {
    position: relative;
    z-index: 2;
    padding: 45px 60px;
    text-align: center;
  }

  .course-title {
    font-size: 2.8rem;
    font-weight: 800;
    margin: 0 0 12px;
    background: linear-gradient(90deg, #00eaff, #c084fc, #00eaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 25px rgba(0, 230, 255, 0.35);
  }

  .module-name {
    font-size: 2.4rem;
    font-weight: 700;
    color: #a5d8ff;
    margin: 0 0 30px;
    text-shadow: 0 0 15px rgba(165, 216, 255, 0.5);
  }

  .author {
    position: absolute;
    top: 25px;
    right: 35px;
    font-size: 1.15rem;
    color: #b0b0ff;
    font-weight: 500;
    opacity: 0.92;
  }

  .module-icon {
    position: absolute;
    top: 35px;
    left: 50px;
    width: 110px;
    height: 110px;
    opacity: 0.9;
    filter: drop-shadow(0 0 10px rgba(0, 230, 255, 0.4));
  }

  .terminal {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 12px;
    margin: 35px auto 20px;
    max-width: 720px;
    overflow: hidden;
    box-shadow: 0 6px 25px rgba(0, 0, 0, 0.65);
  }

  .terminal-header {
    background: #161b22;
    padding: 10px 16px;
    font-size: 0.92rem;
    color: #8b949e;
    text-align: left;
    border-bottom: 1px solid #30363d;
  }

  .terminal-content {
    padding: 20px;
    font-family: 'Consolas', 'Courier New', monospace;
    color: #c9d1d9;
    font-size: 1.05rem;
    line-height: 1.6;
    text-align: left;
  }

  .prompt { color: #58a6ff; margin-right: 6px; }

  body { background: #1F1F1F;}
</style>

</head>
</body>

<div class="module-banner">
  <div class="circuit-overlay"></div>
  
  <!-- SVG adaptado del que proporcionaste (estilizado en neón cian) -->
  <svg class="module-icon" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg">
    <path fill="#00eaff" stroke="#00eaff" stroke-width="12" d="M192 384L88.5 384C63.6 384 48.3 356.9 61.1 335.5L114 247.3C122.7 232.8 138.3 224 155.2 224L250.2 224C326.3 95.1 439.8 88.6 515.7 99.7C528.5 101.6 538.5 111.6 540.3 124.3C551.4 200.2 544.9 313.7 416 389.8L416 484.8C416 501.7 407.2 517.3 392.7 526L304.5 578.9C283.2 591.7 256 576.3 256 551.5L256 448C256 412.7 227.3 384 192 384L191.9 384zM464 224C464 197.5 442.5 176 416 176C389.5 176 368 197.5 368 224C368 250.5 389.5 272 416 272C442.5 272 464 250.5 464 224z"/>
  </svg>

  <div class="content-wrapper">
    <h1 class="course-title">Python desde Cero</h1>
    <h2 class="module-name">Módulo 8 – Proyectos Integradores y Avanzados</h2>
    
    <div class="author">Por: Hector Martinez</div>

    <div class="terminal">
      <div class="terminal-header">Python 3.12 – Proyecto Capstone</div>
      <div class="terminal-content">
        <span class="prompt">>>> </span>class ProyectoFinal:<br>
        <span class="prompt">... </span>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self):<br>
        <span class="prompt">... </span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.integracion = "Todo lo aprendido"<br>
        <span class="prompt">... </span><br>
        <span class="prompt">>>> </span>print("¡Proyecto completado!")<br>
        ¡Proyecto completado!<br>
        <span class="prompt">>>> </span>
      </div>
    </div>
  </div>
</div>
    
</body>
</html>
