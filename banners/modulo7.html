<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
  .module-banner {
    background: linear-gradient(135deg, #0f0c29 0%, #1a1447 50%, #0a1f3a 100%);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
    max-width: 1000px;
    margin: 30px auto;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0ff;
    position: relative;
  }

  .circuit-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 15% 25%, rgba(0, 255, 255, 0.07) 0%, transparent 60%),
                radial-gradient(circle at 85% 75%, rgba(138, 43, 226, 0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .content-wrapper {
    position: relative;
    z-index: 2;
    padding: 45px 60px;
    text-align: center;
  }

  .course-title {
    font-size: 2.8rem;
    font-weight: 800;
    margin: 0 0 12px;
    background: linear-gradient(90deg, #00eaff, #c084fc, #00eaff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 25px rgba(0, 230, 255, 0.35);
  }

  .module-name {
    font-size: 2.4rem;
    font-weight: 700;
    color: #a5d8ff;
    margin: 0 0 30px;
    text-shadow: 0 0 15px rgba(165, 216, 255, 0.5);
  }

  .author {
    position: absolute;
    top: 25px;
    right: 35px;
    font-size: 1.15rem;
    color: #b0b0ff;
    font-weight: 500;
    opacity: 0.92;
  }

  .module-icon {
    position: absolute;
    top: 35px;
    left: 50px;
    width: 110px;
    height: 110px;
    opacity: 0.9;
  }

  .terminal {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 12px;
    margin: 35px auto 20px;
    max-width: 720px;
    overflow: hidden;
    box-shadow: 0 6px 25px rgba(0, 0, 0, 0.65);
  }

  .terminal-header {
    background: #161b22;
    padding: 10px 16px;
    font-size: 0.92rem;
    color: #8b949e;
    text-align: left;
    border-bottom: 1px solid #30363d;
  }

  .terminal-content {
    padding: 20px;
    font-family: 'Consolas', 'Courier New', monospace;
    color: #c9d1d9;
    font-size: 1.05rem;
    line-height: 1.6;
    text-align: left;
  }

  .prompt { color: #58a6ff; margin-right: 6px; }

  body { background: #1F1F1F;}
</style>

</head>
</body>

<div class="module-banner">
  <div class="circuit-overlay"></div>
  
  <!-- SVG distintivo para Bibliotecas: paquetes e import -->
  <svg class="module-icon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Caja principal pip -->
    <rect x="40" y="40" width="120" height="80" rx="12" fill="#1e3a8a" stroke="#00eaff" stroke-width="6"/>
    <text x="100" y="80" fill="#fff" font-size="32" font-weight="bold" text-anchor="middle">pip</text>
    
    <!-- Flechas de instalación/import -->
    <path d="M100 120 L100 140" stroke="#00eaff" stroke-width="6"/>
    <circle cx="100" cy="170" r="20" fill="#2d1b5e" stroke="#a78bfa" stroke-width="6"/>
    <text x="100" y="175" fill="#fff" font-size="24" text-anchor="middle">import</text>
    
    <!-- Conexiones a paquetes -->
    <circle cx="60" cy="100" r="15" fill="#3b1e8a" stroke="#c084fc" stroke-width="5"/>
    <circle cx="140" cy="100" r="15" fill="#3b1e8a" stroke="#c084fc" stroke-width="5"/>
  </svg>

  <div class="content-wrapper">
    <h1 class="course-title">Python desde Cero</h1>
    <h2 class="module-name">Módulo 7 – Bibliotecas y Buenas Prácticas</h2>
    
    <div class="author">Por: Hector Martinez</div>

    <div class="terminal">
      <div class="terminal-header">Python 3.12 – Librerías y estilo</div>
      <div class="terminal-content">
        <span class="prompt">>>> </span>import requests<br>
        <span class="prompt">>>> </span>response = requests.get("https://api.github.com")<br>
        <span class="prompt">>>> </span>print(response.status_code)<br>
        200<br>
        <span class="prompt">>>> </span># PEP 8: nombres en snake_case<br>
        <span class="prompt">>>> </span>
      </div>
    </div>
  </div>
</div>
    
</body>
</html>
